name: Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Generate Temporary Keystore
        run: |
          keytool -genkey -v -keystore temporary.keystore -alias temp_alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Temp, OU=Temp, O=Temp, L=Temp, S=Temp, C=US" -storepass temppassword -keypass temppassword

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks temporary.keystore --ks-key-alias temp_alias --ks-pass pass:temppassword --key-pass pass:temppassword --out app-release-signed.apk app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.sha }}
          release_name: Release ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Upload Signed APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app-release-signed.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive
